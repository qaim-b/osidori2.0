<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
  >
  <meta name="description" content="Osidori 2.0 - couples finance and life dashboard">
  <meta name="theme-color" content="#F3F8FF">
  <meta name="format-detection" content="telephone=no">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Osidori 2.0">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Osidori 2.0</title>
  <link rel="manifest" href="manifest.json">
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      position: fixed;
      inset: 0;
      -webkit-text-size-adjust: 100%;
      background: #F3F8FF;
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      touch-action: manipulation;
      overscroll-behavior-y: none;
    }

    #boot-shell {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: env(safe-area-inset-top) 24px env(safe-area-inset-bottom);
      background:
        radial-gradient(circle at top, rgba(107, 196, 179, 0.28), transparent 42%),
        linear-gradient(180deg, #f8fbff 0%, #f6f2eb 100%);
      color: #141416;
    }

    #boot-card {
      width: min(100%, 420px);
      padding: 28px 24px;
      border-radius: 28px;
      background: rgba(255, 255, 255, 0.78);
      box-shadow: 0 20px 60px rgba(20, 20, 22, 0.08);
      backdrop-filter: blur(14px);
      text-align: center;
    }

    #boot-mark {
      width: 88px;
      height: 88px;
      margin: 0 auto 16px;
      border-radius: 24px;
      object-fit: cover;
      display: block;
      box-shadow: 0 14px 28px rgba(14, 107, 104, 0.16);
    }

    #boot-title {
      margin: 0 0 8px;
      font-size: 26px;
      font-weight: 800;
      letter-spacing: -0.03em;
    }

    #boot-copy {
      margin: 0;
      color: rgba(20, 20, 22, 0.68);
      font-size: 14px;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div id="boot-shell">
    <div id="boot-card">
      <img id="boot-mark" src="assets/images/stitch.png" alt="Osidori logo">
      <h1 id="boot-title">Opening Osidori</h1>
      <p id="boot-copy">Loading your latest shared money view and updates.</p>
    </div>
  </div>
  <script src="flutter_bootstrap.js" async></script>
  <script>
    window.addEventListener('flutter-first-frame', function () {
      var boot = document.getElementById('boot-shell');
      if (boot) boot.remove();
    });
  </script>
</body>
</html>
